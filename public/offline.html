<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Conecta Eleitor offline</title>
    <style>
      :root {
        color: #172033;
        background: #f3f6fa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 480px);
        padding: 28px;
        border: 1px solid #dfe7ef;
        border-radius: 16px;
        background: #fff;
        box-shadow: 0 22px 60px rgba(18, 40, 64, 0.12);
      }
      span {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 14px;
        background: #e7f4fb;
        color: #1261a6;
        font-weight: 900;
      }
      h1 {
        margin: 22px 0 10px;
        color: #071827;
        font-size: 1.7rem;
      }
      p {
        margin: 0;
        color: #667789;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <span>CE</span>
      <h1>Você está offline</h1>
      <p>O Conecta Eleitor está instalado, mas precisa de conexão para sincronizar dados do gabinete.</p>
    </main>
  </body>
</html>
