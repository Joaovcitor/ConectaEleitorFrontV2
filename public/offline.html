<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegisGest offline</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;800&family=Source+Sans+3:wght@400;600;700;800&display=swap" rel="stylesheet" />
    <style>
      :root {
        color: #2b3138;
        background: #f5f7fa;
        font-family: "Source Sans 3", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 480px);
        padding: 28px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 44px rgba(18, 52, 77, 0.1);
      }
      img {
        width: 52px;
        height: 52px;
        border-radius: 8px;
        display: block;
        object-fit: cover;
        box-shadow: 0 12px 28px rgba(18, 52, 77, 0.18);
      }
      h1 {
        margin: 22px 0 10px;
        font-family: "Playfair Display", Georgia, "Times New Roman", serif;
        color: #12344d;
        font-size: 1.7rem;
      }
      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <img src="/branding/legisgest-emblem.png" alt="Símbolo LegisGest" />
      <h1>Você está offline</h1>
      <p>O LegisGest está instalado, mas precisa de conexão para sincronizar dados do gabinete.</p>
    </main>
  </body>
</html>
