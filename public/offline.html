<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LegisGest offline</title>
    <style>
      :root {
        color: #2b3138;
        background: #f5f7fa;
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }
      main {
        width: min(100%, 480px);
        padding: 28px;
        border: 1px solid #e5e7eb;
        border-radius: 8px;
        background: #fff;
        box-shadow: 0 18px 44px rgba(18, 52, 77, 0.1);
      }
      span {
        width: 52px;
        height: 52px;
        display: grid;
        place-items: center;
        border-radius: 8px;
        background: #edf5fb;
        color: #1e5f8c;
        font-weight: 900;
      }
      h1 {
        margin: 22px 0 10px;
        color: #12344d;
        font-size: 1.7rem;
      }
      p {
        margin: 0;
        color: #6b7280;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <main>
      <span>LG</span>
      <h1>Você está offline</h1>
      <p>O LegisGest está instalado, mas precisa de conexão para sincronizar dados do gabinete.</p>
    </main>
  </body>
</html>
